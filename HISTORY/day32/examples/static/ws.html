<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WebSocket Echo Demo - Airi-Cpp-Server-Lib</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; max-width: 720px;
         margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 22px; }
  #log { background: #1e1e1e; color: #d4d4d4; padding: 12px;
         height: 320px; overflow-y: auto; border-radius: 6px;
         font-family: ui-monospace, "SF Mono", Consolas, monospace;
         font-size: 13px; white-space: pre-wrap; }
  .row { display: flex; gap: 8px; margin-top: 12px; }
  input[type=text] { flex: 1; padding: 8px; font-size: 14px;
                     border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 16px; font-size: 14px; cursor: pointer;
           border: 1px solid #1976d2; background: #1976d2; color: #fff;
           border-radius: 4px; }
  button:hover { background: #1565c0; }
  button:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 12px; margin-left: 8px; }
  .ok { background: #c8e6c9; color: #2e7d32; }
  .bad { background: #ffcdd2; color: #c62828; }
</style>
</head>
<body>
<h1>WebSocket Echo Demo
  <span id="status" class="status bad">disconnected</span>
</h1>
<p>本页演示 <code>Airi-Cpp-Server-Lib</code> 的 WebSocket 能力（day31 实现）。
   服务器路径：<code>ws://&lt;host&gt;:&lt;port&gt;/ws/echo</code>。</p>

<div id="log">[等待连接……]</div>

<div class="row">
  <input type="text" id="msg" placeholder="输入要发送的文本，按 Enter 发送" autocomplete="off">
  <button id="send" disabled>发送</button>
</div>
<div class="row">
  <button id="ping">发 Ping</button>
  <button id="close">关闭连接</button>
  <button id="reconnect">重连</button>
</div>

<script>
const log = document.getElementById('log');
const msgInput = document.getElementById('msg');
const sendBtn = document.getElementById('send');
const pingBtn = document.getElementById('ping');
const closeBtn = document.getElementById('close');
const reconnectBtn = document.getElementById('reconnect');
const statusEl = document.getElementById('status');

let ws = null;

function append(line, kind = '') {
  const ts = new Date().toLocaleTimeString();
  log.textContent += `\n[${ts}] ${kind}${line}`;
  log.scrollTop = log.scrollHeight;
}

function setStatus(connected) {
  statusEl.textContent = connected ? 'connected' : 'disconnected';
  statusEl.className = 'status ' + (connected ? 'ok' : 'bad');
  sendBtn.disabled = !connected;
}

function connect() {
  const url = (location.protocol === 'https:' ? 'wss://' : 'ws://')
            + location.host + '/ws/echo';
  append(`connecting to ${url}`);
  ws = new WebSocket(url);
  ws.onopen = () => { setStatus(true); append('OPEN'); };
  ws.onmessage = (ev) => append(`◀ ${ev.data}`, '');
  ws.onclose = (ev) => { setStatus(false);
                          append(`CLOSE code=${ev.code} reason="${ev.reason}"`); };
  ws.onerror = (e) => append('ERROR (see console)');
}

sendBtn.onclick = () => {
  if (ws && ws.readyState === 1 && msgInput.value) {
    ws.send(msgInput.value);
    append(`▶ ${msgInput.value}`);
    msgInput.value = '';
  }
};
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendBtn.click();
});
pingBtn.onclick = () => {
  if (ws && ws.readyState === 1) {
    // 浏览器 WebSocket API 不允许直接发 ping 控制帧；这里发个 [PING] 文本
    ws.send('[PING]');
    append('▶ [PING]  (浏览器 API 限制，用文本模拟)');
  }
};
closeBtn.onclick = () => { if (ws) ws.close(1000, 'user closed'); };
reconnectBtn.onclick = () => {
  if (ws && ws.readyState === 1) ws.close();
  connect();
};

connect();
</script>
</body>
</html>
