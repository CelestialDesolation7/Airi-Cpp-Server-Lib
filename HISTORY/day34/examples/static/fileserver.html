<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文件管理</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f4f8;
            padding: 40px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #1a202c; margin-bottom: 4px; }
        .subtitle { color: #718096; font-size: 0.9rem; margin-bottom: 28px; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 1.1rem; color: #2d3748; margin-bottom: 16px; }
        .upload-form {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        input[type="file"] {
            flex: 1;
            padding: 8px;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            background: #f7fafc;
            cursor: pointer;
        }
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-upload { background: #4299e1; color: white; }
        .btn-download { background: #48bb78; color: white; font-size: 0.8rem; padding: 5px 12px; }
        .btn-delete { background: #fc8181; color: white; font-size: 0.8rem; padding: 5px 12px; }
        .btn-back { background: #e2e8f0; color: #4a5568; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; background: #f7fafc;
             color: #718096; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 12px; border-top: 1px solid #edf2f7; vertical-align: middle; }
        .filename { font-weight: 500; color: #2d3748; }
        .actions { display: flex; gap: 8px; }
        .empty { text-align: center; color: #a0aec0; padding: 32px; font-size: 0.9rem; }
        .back-link { margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 文件管理</h1>
        <p class="subtitle">支持上传、下载、删除文件</p>

        <div class="card">
            <h2>上传新文件</h2>
            <form action="/upload" method="post" enctype="multipart/form-data" class="upload-form">
                <input type="file" name="file" id="fileInput">
                <button type="submit" class="btn btn-upload">⬆ 上传</button>
            </form>
        </div>

        <div class="card">
            <h2>文件列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
<!--filelist-->
                </tbody>
            </table>
        </div>

        <div class="back-link">
            <a href="/" class="btn btn-back">← 返回首页</a>
        </div>
    </div>
</body>
</html>
