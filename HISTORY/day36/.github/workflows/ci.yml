name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  # ── 构建 & 单元测试（Linux + macOS 矩阵）──────────────────────
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run CTest
        working-directory: build
        run: ctest --output-on-failure -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

  # ── AddressSanitizer ──────────────────────────────────────────
  sanitizer-asan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (ASan)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMCPP_ENABLE_ASAN=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (ASan)
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

  # ── ThreadSanitizer ────────────────────────────────────────────
  sanitizer-tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (TSan)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMCPP_ENABLE_TSAN=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (TSan)
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

  # ── UndefinedBehaviorSanitizer ────────────────────────────────
  sanitizer-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (UBSan)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMCPP_ENABLE_UBSAN=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test (UBSan)
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

  # ── 代码覆盖率 ───────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 锁定 gcc/lcov 版本，避免 ubuntu-latest 上 lcov 2.x 与 gcov-13 的不兼容告警导致 CI 失败
      - name: Install gcc-11 + lcov
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11 g++-11 lcov
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-11 100
          gcc --version
          lcov --version

      - name: Configure (Coverage)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DMCPP_ENABLE_COVERAGE=ON
        env:
          CC: gcc-11
          CXX: g++-11

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -j$(nproc) || true   # 容忍个别用例（确保 coverage 仍能产出）

      - name: Collect coverage
        run: |
          # 容忍多种 lcov 1.x/2.x 的兼容性告警
          IGNORE_ERRORS="--ignore-errors mismatch,unused,empty,gcov,negative,inconsistent,format,corrupt,source"
          lcov --capture --directory build \
               --output-file coverage.info \
               --gcov-tool gcov-11 \
               --rc lcov_branch_coverage=0 \
               $IGNORE_ERRORS || echo "::warning::lcov capture had warnings"
          if [ ! -s coverage.info ]; then
            echo "::warning::coverage.info is empty, generating placeholder"
            echo "TN:" > coverage.info
          fi
          lcov --remove coverage.info \
               '/usr/*' '*/_deps/*' '*/googletest/*' '*/test/*' '*/build/*' \
               --output-file coverage.filtered.info \
               $IGNORE_ERRORS || cp coverage.info coverage.filtered.info
          mv coverage.filtered.info coverage.info
          lcov --list coverage.info $IGNORE_ERRORS || true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info
          if-no-files-found: warn

  # ── 静态分析 (clang-tidy) ────────────────────────────────────
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (generate headers / PCH)
        run: cmake --build build -j$(nproc)

      - name: Run clang-tidy
        run: cmake --build build --target clang-tidy

  # ── 性能回归（基准 QPS 阈值告警）───────────────────────────────
  benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run benchmark
        working-directory: build
        run: |
          # 启动最小 demo_server（无中间件），后台运行
          if [ -f ./demo_server ]; then
            ./demo_server &
            SERVER_PID=$!
            sleep 2
            PORT=9090
          elif [ -f ./http_server ]; then
            ./http_server &
            SERVER_PID=$!
            sleep 2
            PORT=8888
          else
            echo "No server binary found, skipping benchmark"
            exit 0
          fi

          # 运行内置 BenchmarkTest（4 线程 5 秒）
          QPS=$(./BenchmarkTest 127.0.0.1 $PORT / 4 5 2>&1 | grep -oP 'QPS:\s+\K[0-9.]+' || echo "0")
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

          echo "Measured QPS: $QPS"

          # 阈值检查：QPS 不得低于 10000（CI 环境性能有限，仅做冒烟检测）
          if [ -z "$QPS" ] || [ "$QPS" = "0" ]; then
            echo "::warning::Benchmark did not produce QPS result"
            exit 0
          fi

          QPS_INT=$(printf "%.0f" "$QPS")
          THRESHOLD=10000
          if [ "$QPS_INT" -lt "$THRESHOLD" ]; then
            echo "::error::QPS regression detected: $QPS < $THRESHOLD"
            exit 1
          fi
          echo "✓ Benchmark passed: QPS=$QPS (threshold=$THRESHOLD)"
