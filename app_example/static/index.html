<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Airi-Cpp-Server-Lib Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 { font-size: 1.8rem; color: #1a202c; margin-bottom: 8px; }
        .subtitle { color: #718096; font-size: 0.95rem; margin-bottom: 32px; }
        .badge {
            display: inline-block;
            background: #ebf8ff;
            color: #2b6cb0;
            border: 1px solid #bee3f8;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.8rem;
            margin: 0 4px 8px;
        }
        .nav { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #4299e1; color: white; }
        .btn-secondary { background: #48bb78; color: white; }
        .btn-outline { background: white; color: #4a5568; border: 2px solid #e2e8f0; }
        .features {
            margin-top: 28px;
            text-align: left;
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px 20px;
        }
        .features h3 { color: #4a5568; font-size: 0.85rem; text-transform: uppercase;
                        letter-spacing: 0.05em; margin-bottom: 8px; }
        .features li { color: #718096; font-size: 0.9rem; padding: 3px 0; list-style: none; }
        .features li::before { content: "✓  "; color: #48bb78; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Airi-Cpp-Server-Lib</h1>
        <p class="subtitle">基于自研 C++ 多 Reactor 网络库的 HTTP Demo</p>

        <div>
            <span class="badge">Reactor 模式</span>
            <span class="badge">kqueue / epoll</span>
            <span class="badge">异步日志</span>
            <span class="badge">定时器</span>
        </div>

        <nav class="nav">
            <a href="/fileserver" class="btn btn-primary">📁 文件管理服务器</a>
            <a href="/login.html" class="btn btn-secondary">🔐 登录演示</a>
            <a href="/echo" class="btn btn-outline">↩ Echo 测试（POST）</a>
        </nav>

        <div class="features">
            <h3>已实现功能</h3>
            <ul>
                <li>静态文件服务（HTML / 图片）</li>
                <li>文件列表、下载、删除</li>
                <li>文件上传（multipart/form-data）</li>
                <li>POST 登录表单验证</li>
                <li>302 重定向</li>
            </ul>
        </div>
    </div>
</body>
</html>
