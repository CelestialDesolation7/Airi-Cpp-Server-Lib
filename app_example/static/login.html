<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            width: 360px;
        }
        h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 6px; text-align: center; }
        .subtitle { color: #718096; font-size: 0.85rem; text-align: center; margin-bottom: 28px; }
        .hint {
            background: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #2b6cb0;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #4299e1; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #3182ce; }
        .back { display: block; text-align: center; margin-top: 16px;
                color: #718096; font-size: 0.85rem; text-decoration: none; }
        .back:hover { color: #4299e1; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 登录</h1>
        <p class="subtitle">演示 POST 表单登录验证</p>

        <div class="hint">
            测试账号：<strong>admin</strong> / <strong>admin123</strong>
        </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="输入密码">
            </div>
            <button type="submit" class="btn-submit">登录</button>
        </form>

        <a href="/" class="back">← 返回首页</a>
    </div>
</body>
</html>
